name: Publish Docker Image on Release

# Triggers this workflow ONLY when a release is successfully published
on:
  release:
    types: [published]

# Required permissions for job steps to function correctly
permissions:
  contents: read # Allows checkout of the repository code
  packages: write # REQUIRED: Grants permission to push images to GHCR/Docker Hub

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Recommended environment variables setup for clean build
    env: {}

    steps:
      # Step 1: Checkout the repository code to access Dockerfile and context files.
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Log in to the Container Registry (Recommended target is GHCR)
      # This uses the built-in token which automatically manages credentials for this repo.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: docker.io # Targeting public Docker Hub
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3: Extract necessary metadata (tags and labels) from the release event.
      - name: Extract metadata for Docker image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }} # Sets target path to current repo/ghcr

      # Step 4: Build and Push the Image (The core operation)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .           # The build context directory is the root of the repo.
          file: ./Dockerfile  # Path to your local Dockerfile. Adjust if necessary.
          push: true           # Crucial flag: ensures 'docker push' runs if build succeeds.
          tags: ${{ steps.meta.outputs.tags }} # Tags generated by metadata-action (e.g., vX.Y.Z, latest)
          labels: ${{ steps.meta.outputs.labels }}